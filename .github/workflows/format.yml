name: format-check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-checks:
    name: Clang Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache LLVM apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: llvm-21-apt-${{ runner.os }}

      - name: Install LLVM apt repo
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21

      - name: Install clang-format 21
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-21
          clang-format-21 --version

      - name: Run clang-format check
        run: |
          FILES=$(find src/ -name '*.[ch]pp' -o -name '*.[ch]')
          FORMAT_ERRORS=0
          for FILE in $FILES; do
            if ! clang-format-21 -style=file "$FILE" | diff -u "$FILE" - > /dev/null; then
              echo "Formatting issue in $FILE"
              FORMAT_ERRORS=1
            fi
          done
          if [ "$FORMAT_ERRORS" -ne 0 ]; then
            echo "❌ Clang-format check failed."
            exit 1
          else
            echo "✅ Clang-format check passed."
          fi

  clang-tidy:
    name: Clang Tidy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache LLVM apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: llvm-21-apt-${{ runner.os }}

      - name: Install LLVM 21 and system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg \
            build-essential git make pkg-config cmake ninja-build \
            libasound2-dev libpulse-dev libaudio-dev libfribidi-dev libjack-dev libsndio-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev \
            libxss-dev libxtst-dev libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev \
            libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev \
            libpipewire-0.3-dev libwayland-dev libxinerama-dev
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y clang-tidy-21

      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: .xmake-cache

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            build/.packages
            ~/.xmake/packages
          key: ${{ runner.os }}-${{ hashFiles('xmake.lua', '.gitmodules') }}
          restore-keys: ${{ runner.os }}-

      - name: Generate compile_commands.json
        run: |
          xmake f -y -m release
          xmake

      - name: Run clang-tidy
        run: |
          run-clang-tidy-21 -j $(nproc) -p . \
            -clang-tidy-binary clang-tidy-21 \
            -header-filter='^.*\/src\/.*' \
            $(find src/ -name '*.cpp' | tr '\n' ' ')
