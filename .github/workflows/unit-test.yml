name: unit-test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-tests-linux:
    name: Linux unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install SDL3 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git make pkg-config cmake ninja-build \
            libasound2-dev libpulse-dev libaudio-dev libfribidi-dev libjack-dev libsndio-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev \
            libxss-dev libxtst-dev libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev \
            libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev \
            libpipewire-0.3-dev libwayland-dev libxinerama-dev

      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: .xmake-cache

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            build/.packages
            ~/.xmake/packages
          key: ${{ runner.os }}-${{ hashFiles('xmake.lua', '.gitmodules') }}
          restore-keys: ${{ runner.os }}-

      - name: Run unit tests
        run: |
          xmake build atmo-test
          xmake test -v

  run-tests-macos:
    name: macOS unit tests
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: .xmake-cache

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            build/.packages
            ~/.xmake/packages
          key: ${{ runner.os }}-${{ hashFiles('xmake.lua', '.gitmodules') }}
          restore-keys: ${{ runner.os }}-

      - name: Run unit tests
        run: |
          xmake build atmo-test
          xmake test -v

  run-tests-windows:
    name: Windows unit tests
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: .xmake-cache

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            build/.packages
            ~/.xmake/packages
          key: ${{ runner.os }}-${{ hashFiles('xmake.lua', '.gitmodules') }}
          restore-keys: ${{ runner.os }}-

      - name: Run unit tests
        run: |
          xmake build atmo-test
          xmake test -v
